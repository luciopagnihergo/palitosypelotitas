<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>palitosypelotitas</title>
    <link rel="icon" type="image/png" href="./auto%20fitito.png" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f9;
        --fg: #1a1d24;
        --muted: #5c6470;
        --accent: #2563eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #12141a;
          --fg: #eef0f4;
          --muted: #a3aab8;
          --accent: #60a5fa;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: grid;
        place-items: end center;
        padding: 1.5rem;
        line-height: 1.6;
      }
      main {
        width: min(100%, 58rem);
        text-align: center;
      }
      h1 {
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
      }
      a {
        display: inline-block;
        margin-top: 1.5rem;
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
      .autos {
        margin-top: 2rem;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
        align-items: end;
      }
      .auto {
        border: 1px solid color-mix(in oklab, var(--muted) 35%, transparent);
        border-radius: 0.9rem;
        padding: 1rem;
        background: color-mix(in oklab, var(--bg) 80%, var(--fg) 20%);
        display: flex;
        flex-direction: column;
      }
      .bultos {
        display: grid;
        grid-template-columns: 1fr;
        align-content: end;
        gap: 0.65rem;
        margin-bottom: 0;
        min-height: 420px;
        padding: 0.45rem;
        border: 1px dashed color-mix(in oklab, var(--muted) 45%, transparent);
        border-radius: 0.65rem;
      }
      .bulto-card {
        border: 1px solid color-mix(in oklab, var(--muted) 30%, transparent);
        border-radius: 0.55rem;
        padding: 0.55rem;
        background: color-mix(in oklab, var(--bg) 88%, var(--fg) 12%);
        cursor: grab;
      }
      .bulto-card:active {
        cursor: grabbing;
      }
      .bulto-contenido {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.4rem;
      }
      .bulto-card img {
        width: 100%;
        height: 68px;
        object-fit: contain;
        border-radius: 0.45rem;
        background: color-mix(in oklab, white 55%, transparent);
      }
      .bulto-label {
        font-size: 0.96rem;
        font-weight: 600;
        color: var(--fg);
        text-align: center;
        width: 100%;
      }
      .auto > img {
        width: 100%;
        height: 220px;
        object-fit: contain;
        border-radius: 0.6rem;
        background: color-mix(in oklab, white 45%, transparent);
        margin-top: 0.45rem;
      }
      .bultos.drop-hover {
        border-color: var(--accent);
        background: color-mix(in oklab, var(--accent) 10%, transparent);
      }
      .timeline {
        margin-top: 1.2rem;
        border: 1px solid color-mix(in oklab, var(--muted) 35%, transparent);
        border-radius: 0.9rem;
        padding: 1rem;
        background: color-mix(in oklab, var(--bg) 82%, var(--fg) 18%);
        text-align: left;
      }
      .timeline h2 {
        margin: 0 0 0.8rem;
        font-size: 1.05rem;
      }
      .timeline-track {
        position: relative;
        height: 4px;
        background: color-mix(in oklab, var(--muted) 50%, transparent);
        border-radius: 999px;
        margin: 1.1rem 0 0.8rem;
      }
      .timeline-point {
        position: absolute;
        top: 50%;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: var(--accent);
        transform: translate(-50%, -50%);
      }
      .timeline-point.start {
        left: 0%;
      }
      .timeline-point.end {
        left: 100%;
      }
      .timeline-point.today {
        left: 0%;
        width: 14px;
        height: 14px;
        background: #22c55e;
        box-shadow: 0 0 0 3px color-mix(in oklab, #22c55e 35%, transparent);
      }
      .timeline-today-label {
        display: inline-block;
        margin-top: 0.35rem;
        font-size: 0.88rem;
        font-weight: 600;
        color: #22c55e;
      }
      .timeline-dates {
        display: flex;
        justify-content: space-between;
        font-size: 0.92rem;
        color: var(--muted);
      }
      .timeline img {
        display: block;
        width: 100%;
        max-height: 260px;
        object-fit: contain;
        border-radius: 0.7rem;
        border: 1px solid color-mix(in oklab, var(--muted) 30%, transparent);
        background: color-mix(in oklab, white 45%, transparent);
      }
      .route-track {
        position: relative;
        height: 58px;
        border-radius: 6px;
        margin-top: 0.9rem;
        background:
          linear-gradient(
            to bottom,
            #f8fafc 0 3px,
            transparent 3px calc(100% - 3px),
            #f8fafc calc(100% - 3px) 100%
          ),
          repeating-linear-gradient(
              to right,
              #ffd54a 0 28px,
              transparent 28px 46px
            )
            center / 100% 4px no-repeat,
          linear-gradient(
            to bottom,
            #535d6f 0 10%,
            #394253 10% 90%,
            #535d6f 90% 100%
          );
        box-shadow:
          0 1px 0 color-mix(in oklab, #f8fafc 70%, transparent),
          0 -1px 0 color-mix(in oklab, #f8fafc 70%, transparent),
          0 6px 14px color-mix(in oklab, #0f172a 22%, transparent),
          inset 0 0 0 1px color-mix(in oklab, #0f172a 65%, transparent),
          inset 0 0 12px color-mix(in oklab, #0f172a 40%, transparent);
      }
      .route-car {
        position: absolute;
        left: calc(50% - 22px);
        width: 44px;
        height: 24px;
        object-fit: contain;
        z-index: 1;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.35));
      }
      .route-car.fitito {
        bottom: 30px;
      }
      .route-car.bmw {
        bottom: 4px;
      }
      @media (max-width: 640px) {
        .autos {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="autos" aria-label="Autos">
        <article class="auto">
          <div class="bultos" id="fitito-zone" aria-label="Bultos sobre Fitito"></div>
          <img src="./auto fitito.png" alt="Auto Fitito" />
        </article>
        <article class="auto">
          <div class="bultos" id="bmw-zone" aria-label="Bultos sobre BMW"></div>
          <img src="./bmv.png" alt="Auto BMW moderno" />
        </article>
      </section>
      <section class="timeline" aria-label="Linea de tiempo de autos">
        <h2>Linea de tiempo</h2>
        <img src="./autos.png" alt="Fitito y BMW en linea de tiempo" />
        <div class="timeline-track" aria-hidden="true">
          <span class="timeline-point start"></span>
          <span class="timeline-point end"></span>
          <span class="timeline-point today" id="timeline-today-marker"></span>
        </div>
        <span class="timeline-today-label" id="timeline-today-label">Hoy</span>
        <div class="timeline-dates">
          <span>27 de abril de 2026</span>
          <span>27 de abril de 2027</span>
        </div>
        <div class="route-track" id="route-track" aria-hidden="true">
          <img id="route-fitito" class="route-car fitito" src="./auto fitito.png" alt="" />
          <img id="route-bmw" class="route-car bmw" src="./bmv.png" alt="" />
        </div>
      </section>
    </main>
    <script>
      const stringsBultos = [
        "ABM de artículos, clientes y proveedores del Grupo Hergo.",
        "Identificación de clientes para compras en mayorista.",
        "Listas de precios de proveedor.",
        "Gestión de órdenes de compras.",
        "Simulador de pedidos de reposición (anteriormente Planilla Abastecimiento).",
        "Ingreso de mercadería de proveedores.",
        "Simulador de precios considerando costo, margen y precio de venta.",
        "Listas de precios para Mayorista y Distribución.",
        "Diferenciación de lista de Venta Mayorista de Salón Mayorista.",
        "Configuración de venta mayorista con listas por canal.",
        "Definición de cuentas contables.",
        "Gestión de cuentas corrientes.",
        "Configuración de cuentas bancarias.",
        "Registro de asientos contables.",
        "Control de IVA compra e IVA venta.",
        "Implementación de imputaciones automáticas.",
        "Gestión de cajas y valores.",
        "Transferencias de stock entre depósitos y entre empresas.",
        "Acciones de stock por roturas y vencimientos.",
        "Rendición de valores de repartos de la Etapa 1.",
        "Gestión de cuentas corrientes de clientes.",
        "Procesos de cobranzas.",
        "Flujos de ingresos de dinero del Grupo.",
        "Realización de conciliaciones bancarias.",
        "Gestión de ofertas para distribución.",
        "Convenios y sin cargos comerciales.",
        "Configuración de rutas comerciales con ruteo automático y dinámico.",
        "Definición de operadores y cronogramas de servicio.",
        "Control de surtido habilitado y stock disponible.",
        "Establecimiento de mínimos de compra.",
        "Gestión de servicios logísticos.",
        "Carga de pedidos por canales de vendedores.",
        "Dinámica de venta para televentas.",
        "Implementación de canales de autogestión para pedidos.",
        "Autorizaciones comerciales de pedidos.",
        "Autorizaciones logísticas y administrativas de pedidos.",
        "Autorizaciones de cuentas corrientes para pedidos.",
        "Visualización del parte diario de ventas en PDA.",
        "Generación de remitos de envases y pallets.",
        "Realización de inventarios de mercadería.",
        "Ejecución de ajustes de stock.",
        "Semi-automatización de armado de zonas de tráfico.",
        "Uso de herramientas visuales y mapas para tráfico.",
        "Sistema de ruteo sugerido automático.",
        "Definición de tarifario base.",
        "Gestión de retira clientes.",
        "Proceso de armado de pedidos.",
        "Emisión de hojas de rutas con remitos de entrega valorizados.",
        "Automatización de facturación y envío de PDF por correo.",
        "Facturación inmediata para entregas de retira cliente.",
        "Generación de presupuestos asociados para facturación B.",
        "Emisión de cartas de pagos a proveedores.",
        "Liquidación de proveedores.",
        "Ejecución de pagos a proveedores.",
        "Procesos de carga y descarga de mercadería.",
        "Finalización de la migración de Venta Mayorista a formato Distribución.",
      ];
      const dropZones = document.querySelectorAll(".bultos");
      const STORAGE_KEY = "palitosypelotitas-bultos-layout-v3";
      const fititoZone = document.getElementById("fitito-zone");
      const bmwZone = document.getElementById("bmw-zone");
      // IDs de bultos que deben quedar siempre del lado BMW.
      // Ejemplo: ["b1", "b5"]
      const BULTOS_FIJOS_BMW = [];
      let draggedCard = null;

      function updateTimelineTodayMarker() {
        const marker = document.getElementById("timeline-today-marker");
        const label = document.getElementById("timeline-today-label");
        const routeTrack = document.getElementById("route-track");
        const fititoSmall = document.getElementById("route-fitito");
        const bmwSmall = document.getElementById("route-bmw");
        if (!marker || !label) return;

        const start = new Date(2026, 3, 27);
        const end = new Date(2027, 3, 27);
        const today = new Date();
        const total = end.getTime() - start.getTime();
        const elapsed = today.getTime() - start.getTime();
        const percentRaw = (elapsed / total) * 100;
        const percent = Math.min(100, Math.max(0, percentRaw));

        marker.style.left = `${percent}%`;
        label.textContent = `Hoy: ${today.toLocaleDateString("es-AR")}`;
        if (fititoSmall && bmwSmall && routeTrack) {
          const trackWidth = routeTrack.clientWidth;
          const carWidth = 44;
          const minLeft = 2;
          const maxLeft = Math.max(minLeft, trackWidth - carWidth - 2);
          const leftPx = minLeft + (percent / 100) * (maxLeft - minLeft);

          fititoSmall.style.left = `${leftPx}px`;
          bmwSmall.style.left = `${leftPx}px`;
        }
      }

      function crearBultoCard(texto, id) {
        const card = document.createElement("div");
        card.className = "bulto-card";
        card.draggable = true;
        card.dataset.bultoId = id;
        card.innerHTML = `
          <div class="bulto-contenido">
            <img src="./bulto.png" alt="${texto}" />
            <span class="bulto-label">${texto}</span>
          </div>
        `;
        return card;
      }

      stringsBultos.forEach((texto, index) => {
        fititoZone.appendChild(crearBultoCard(texto, `b${index + 1}`));
      });

      const bultoCards = document.querySelectorAll(".bulto-card");

      function getZoneState(zoneId) {
        const zone = document.getElementById(zoneId);
        if (!zone) return [];
        return Array.from(zone.querySelectorAll(".bulto-card"))
          .map((card) => card.dataset.bultoId)
          .filter(Boolean);
      }

      function saveLayout() {
        enforceBultosFijosBmw();
        const layout = {
          fitito: getZoneState("fitito-zone"),
          bmw: getZoneState("bmw-zone"),
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(layout));
      }

      function enforceBultosFijosBmw() {
        BULTOS_FIJOS_BMW.forEach((id) => {
          const card = document.querySelector(`[data-bulto-id="${id}"]`);
          if (card) bmwZone.appendChild(card);
        });
      }

      function restoreLayout() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        try {
          const layout = JSON.parse(raw);
          if (!fititoZone || !bmwZone) return;

          (layout.fitito || []).forEach((id) => {
            const card = document.querySelector(`[data-bulto-id="${id}"]`);
            if (card) fititoZone.appendChild(card);
          });
          (layout.bmw || []).forEach((id) => {
            const card = document.querySelector(`[data-bulto-id="${id}"]`);
            if (card) bmwZone.appendChild(card);
          });
        } catch (_error) {
          localStorage.removeItem(STORAGE_KEY);
        }
      }

      restoreLayout();
      enforceBultosFijosBmw();
      updateTimelineTodayMarker();

      bultoCards.forEach((card) => {
        card.addEventListener("dragstart", () => {
          draggedCard = card;
        });
        card.addEventListener("dragend", () => {
          draggedCard = null;
          dropZones.forEach((zone) => zone.classList.remove("drop-hover"));
        });
      });

      dropZones.forEach((zone) => {
        zone.addEventListener("dragover", (event) => {
          event.preventDefault();
          zone.classList.add("drop-hover");
        });
        zone.addEventListener("dragleave", () => {
          zone.classList.remove("drop-hover");
        });
        zone.addEventListener("drop", (event) => {
          event.preventDefault();
          zone.classList.remove("drop-hover");
          if (!draggedCard) return;
          const isFijoBmw = BULTOS_FIJOS_BMW.includes(draggedCard.dataset.bultoId);
          if (isFijoBmw) {
            bmwZone.appendChild(draggedCard);
          } else {
            zone.appendChild(draggedCard);
          }
          saveLayout();
        });
      });
    </script>
  </body>
</html>
