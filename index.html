<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>palitosypelotitas</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f9;
        --fg: #1a1d24;
        --muted: #5c6470;
        --accent: #2563eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #12141a;
          --fg: #eef0f4;
          --muted: #a3aab8;
          --accent: #60a5fa;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: grid;
        place-items: end center;
        padding: 1.5rem;
        line-height: 1.6;
      }
      main {
        width: min(100%, 58rem);
        text-align: center;
      }
      h1 {
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
      }
      a {
        display: inline-block;
        margin-top: 1.5rem;
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
      .autos {
        margin-top: 2rem;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
        align-items: end;
      }
      .auto {
        border: 1px solid color-mix(in oklab, var(--muted) 35%, transparent);
        border-radius: 0.9rem;
        padding: 1rem;
        background: color-mix(in oklab, var(--bg) 80%, var(--fg) 20%);
        display: flex;
        flex-direction: column;
      }
      .bultos {
        display: grid;
        grid-template-columns: 1fr;
        align-content: end;
        gap: 0.65rem;
        margin-bottom: 0;
        min-height: 420px;
        padding: 0.45rem;
        border: 1px dashed color-mix(in oklab, var(--muted) 45%, transparent);
        border-radius: 0.65rem;
      }
      .bulto-card {
        border: 1px solid color-mix(in oklab, var(--muted) 30%, transparent);
        border-radius: 0.55rem;
        padding: 0.55rem;
        background: color-mix(in oklab, var(--bg) 88%, var(--fg) 12%);
        cursor: grab;
      }
      .bulto-card:active {
        cursor: grabbing;
      }
      .bulto-contenido {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.4rem;
      }
      .bulto-card img {
        width: 100%;
        height: 68px;
        object-fit: contain;
        border-radius: 0.45rem;
        background: color-mix(in oklab, white 55%, transparent);
      }
      .bulto-label {
        font-size: 0.96rem;
        font-weight: 600;
        color: var(--fg);
        text-align: center;
        width: 100%;
      }
      .auto > img {
        width: 100%;
        height: 220px;
        object-fit: contain;
        border-radius: 0.6rem;
        background: color-mix(in oklab, white 45%, transparent);
        margin-top: 0.45rem;
      }
      .bultos.drop-hover {
        border-color: var(--accent);
        background: color-mix(in oklab, var(--accent) 10%, transparent);
      }
      @media (max-width: 640px) {
        .autos {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="autos" aria-label="Autos">
        <article class="auto">
          <div class="bultos" id="fitito-zone" aria-label="Bultos sobre Fitito"></div>
          <img src="./auto fitito.png" alt="Auto Fitito" />
        </article>
        <article class="auto">
          <div class="bultos" id="bmw-zone" aria-label="Bultos sobre BMW"></div>
          <img src="./bmv.png" alt="Auto BMW moderno" />
        </article>
      </section>
    </main>
    <script>
      const stringsBultos = [
        "ABM de artículos, clientes y proveedores del Grupo Hergo.",
        "Identificación de clientes para compras en mayorista.",
        "Listas de precios de proveedor.",
        "Gestión de órdenes de compras.",
        "Simulador de pedidos de reposición (anteriormente Planilla Abastecimiento).",
        "Ingreso de mercadería de proveedores.",
        "Simulador de precios considerando costo, margen y precio de venta.",
        "Listas de precios para Mayorista y Distribución.",
        "Diferenciación de lista de Venta Mayorista de Salón Mayorista.",
        "Configuración de venta mayorista con listas por canal.",
        "Definición de cuentas contables.",
        "Gestión de cuentas corrientes.",
        "Configuración de cuentas bancarias.",
        "Registro de asientos contables.",
        "Control de IVA compra e IVA venta.",
        "Implementación de imputaciones automáticas.",
        "Gestión de cajas y valores.",
        "Transferencias de stock entre depósitos y entre empresas.",
        "Acciones de stock por roturas y vencimientos.",
        "Rendición de valores de repartos de la Etapa 1.",
        "Gestión de cuentas corrientes de clientes.",
        "Procesos de cobranzas.",
        "Flujos de ingresos de dinero del Grupo.",
        "Realización de conciliaciones bancarias.",
        "Gestión de ofertas para distribución.",
        "Convenios y sin cargos comerciales.",
        "Configuración de rutas comerciales con ruteo automático y dinámico.",
        "Definición de operadores y cronogramas de servicio.",
        "Control de surtido habilitado y stock disponible.",
        "Establecimiento de mínimos de compra.",
        "Gestión de servicios logísticos.",
        "Carga de pedidos por canales de vendedores.",
        "Dinámica de venta para televentas.",
        "Implementación de canales de autogestión para pedidos.",
        "Autorizaciones comerciales de pedidos.",
        "Autorizaciones logísticas y administrativas de pedidos.",
        "Autorizaciones de cuentas corrientes para pedidos.",
        "Visualización del parte diario de ventas en PDA.",
        "Generación de remitos de envases y pallets.",
        "Realización de inventarios de mercadería.",
        "Ejecución de ajustes de stock.",
        "Semi-automatización de armado de zonas de tráfico.",
        "Uso de herramientas visuales y mapas para tráfico.",
        "Sistema de ruteo sugerido automático.",
        "Definición de tarifario base.",
        "Gestión de retira clientes.",
        "Proceso de armado de pedidos.",
        "Emisión de hojas de rutas con remitos de entrega valorizados.",
        "Automatización de facturación y envío de PDF por correo.",
        "Facturación inmediata para entregas de retira cliente.",
        "Generación de presupuestos asociados para facturación B.",
        "Emisión de cartas de pagos a proveedores.",
        "Liquidación de proveedores.",
        "Ejecución de pagos a proveedores.",
        "Procesos de carga y descarga de mercadería.",
        "Finalización de la migración de Venta Mayorista a formato Distribución.",
      ];
      const dropZones = document.querySelectorAll(".bultos");
      const STORAGE_KEY = "palitosypelotitas-bultos-layout-v3";
      const fititoZone = document.getElementById("fitito-zone");
      const bmwZone = document.getElementById("bmw-zone");
      // IDs de bultos que deben quedar siempre del lado BMW.
      // Ejemplo: ["b1", "b5"]
      const BULTOS_FIJOS_BMW = [];
      let draggedCard = null;

      function crearBultoCard(texto, id) {
        const card = document.createElement("div");
        card.className = "bulto-card";
        card.draggable = true;
        card.dataset.bultoId = id;
        card.innerHTML = `
          <div class="bulto-contenido">
            <img src="./bulto.png" alt="${texto}" />
            <span class="bulto-label">${texto}</span>
          </div>
        `;
        return card;
      }

      stringsBultos.forEach((texto, index) => {
        fititoZone.appendChild(crearBultoCard(texto, `b${index + 1}`));
      });

      const bultoCards = document.querySelectorAll(".bulto-card");

      function getZoneState(zoneId) {
        const zone = document.getElementById(zoneId);
        if (!zone) return [];
        return Array.from(zone.querySelectorAll(".bulto-card"))
          .map((card) => card.dataset.bultoId)
          .filter(Boolean);
      }

      function saveLayout() {
        enforceBultosFijosBmw();
        const layout = {
          fitito: getZoneState("fitito-zone"),
          bmw: getZoneState("bmw-zone"),
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(layout));
      }

      function enforceBultosFijosBmw() {
        BULTOS_FIJOS_BMW.forEach((id) => {
          const card = document.querySelector(`[data-bulto-id="${id}"]`);
          if (card) bmwZone.appendChild(card);
        });
      }

      function restoreLayout() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        try {
          const layout = JSON.parse(raw);
          if (!fititoZone || !bmwZone) return;

          (layout.fitito || []).forEach((id) => {
            const card = document.querySelector(`[data-bulto-id="${id}"]`);
            if (card) fititoZone.appendChild(card);
          });
          (layout.bmw || []).forEach((id) => {
            const card = document.querySelector(`[data-bulto-id="${id}"]`);
            if (card) bmwZone.appendChild(card);
          });
        } catch (_error) {
          localStorage.removeItem(STORAGE_KEY);
        }
      }

      restoreLayout();
      enforceBultosFijosBmw();

      bultoCards.forEach((card) => {
        card.addEventListener("dragstart", () => {
          draggedCard = card;
        });
        card.addEventListener("dragend", () => {
          draggedCard = null;
          dropZones.forEach((zone) => zone.classList.remove("drop-hover"));
        });
      });

      dropZones.forEach((zone) => {
        zone.addEventListener("dragover", (event) => {
          event.preventDefault();
          zone.classList.add("drop-hover");
        });
        zone.addEventListener("dragleave", () => {
          zone.classList.remove("drop-hover");
        });
        zone.addEventListener("drop", (event) => {
          event.preventDefault();
          zone.classList.remove("drop-hover");
          if (!draggedCard) return;
          const isFijoBmw = BULTOS_FIJOS_BMW.includes(draggedCard.dataset.bultoId);
          if (isFijoBmw) {
            bmwZone.appendChild(draggedCard);
          } else {
            zone.appendChild(draggedCard);
          }
          saveLayout();
        });
      });
    </script>
  </body>
</html>
